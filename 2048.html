<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e1b2e">
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#1e1b2e;--board:#2c2640;--cell:#3d3556;
--text:#fef3e2;--text-dark:#2c2640;
--warm1:#ffb088;--warm2:#ff8a7a;--warm3:#e8697a;
--berry:#cf5c9e;--grape:#a855c7;--indigo:#7c6cf0;
--sky:#6bc5e8;--mint:#5dd6a8;--gold:#ffc75c;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
font-family:'Nunito',sans-serif;color:var(--text);
touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;
background:radial-gradient(ellipse at 15% 85%,rgba(207,92,158,.07) 0%,transparent 50%),
radial-gradient(ellipse at 85% 15%,rgba(255,176,136,.06) 0%,transparent 50%),
radial-gradient(ellipse at 50% 40%,rgba(124,108,240,.05) 0%,transparent 55%),var(--bg);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.12;pointer-events:none;animation:oD 16s ease-in-out infinite;}
.o1{width:320px;height:320px;background:var(--warm1);top:-80px;left:-60px;}
.o2{width:260px;height:260px;background:var(--grape);bottom:-60px;right:-40px;animation-delay:-5s;}
.o3{width:220px;height:220px;background:var(--sky);top:45%;left:55%;animation-delay:-10s;}
@keyframes oD{0%,100%{transform:translate(0,0) scale(1);}30%{transform:translate(25px,-18px) scale(1.08);}60%{transform:translate(-15px,12px) scale(.94);}}
.header{display:flex;align-items:center;justify-content:space-between;width:min(430px,92vw);margin-bottom:14px;}
.logo{font-weight:900;font-size:clamp(28px,7vw,42px);
background:linear-gradient(135deg,var(--gold),var(--warm1),var(--warm2),var(--berry));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1.5px;
animation:lB 3s ease-in-out infinite;}
@keyframes lB{0%,100%{transform:scale(1);filter:brightness(1);}50%{transform:scale(1.03);filter:brightness(1.1);}}
.scores{display:flex;gap:8px;}
.score-box{background:rgba(61,53,86,.7);border:1px solid rgba(255,199,92,.12);border-radius:12px;padding:4px 12px;text-align:center;min-width:64px;backdrop-filter:blur(12px);transition:transform .15s cubic-bezier(.22,1.4,.36,1);}
.score-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;color:var(--gold);opacity:.7;}
.score-val{font-weight:900;font-size:18px;display:inline-block;}
.score-val.pop{animation:popSc .2s cubic-bezier(.22,1.6,.36,1) forwards;}
@keyframes popSc{0%{transform:scale(1.35) rotate(-3deg);}50%{transform:scale(1.15) rotate(-1deg);}100%{transform:scale(1) rotate(0);}}
.board-wrap{position:relative;}
.board{position:relative;width:min(430px,92vw);height:min(430px,92vw);background:var(--board);border-radius:18px;padding:10px;
border:1px solid rgba(255,199,92,.08);touch-action:none;
box-shadow:0 24px 64px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.02) inset,0 0 100px rgba(124,108,240,.04);}
.board.locked{pointer-events:none;opacity:.92;}
.board.shake{animation:sk .18s ease-out;}
.board.bigshake{animation:bsk .22s ease-out;}
@keyframes sk{0%{transform:translate(0,0) rotate(0);}15%{transform:translate(-3px,2px) rotate(-.5deg);}35%{transform:translate(2.8px,-1.8px) rotate(.4deg);}55%{transform:translate(-1.8px,1px) rotate(-.2deg);}75%{transform:translate(.8px,-.4px);}100%{transform:translate(0,0) rotate(0);}}
@keyframes bsk{0%{transform:translate(0,0) rotate(0) scale(1);}10%{transform:translate(-5px,3px) rotate(-.9deg) scale(1.008);}22%{transform:translate(4.2px,-3.2px) rotate(.7deg) scale(.994);}36%{transform:translate(-3.2px,2px) rotate(-.4deg);}50%{transform:translate(2px,-1px) rotate(.2deg);}70%{transform:translate(-.8px,.4px);}100%{transform:translate(0,0) rotate(0) scale(1);}}
.glow-layer{position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:90;opacity:0;}
.glow-layer.on{animation:gP .2s ease-out;}
@keyframes gP{0%{opacity:.25;}100%{opacity:0;}}
.grid-bg{position:absolute;inset:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cell-slot{background:var(--cell);border-radius:14px;}
.cell-slot.dimple{animation:dmp .12s ease-out;}
@keyframes dmp{0%{transform:scale(1);}35%{transform:scale(.89);}65%{transform:scale(1.04);}100%{transform:scale(1);}}
.tiles{position:absolute;inset:10px;}
.t{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:14px;font-weight:900;transform-origin:center;
transition:top 65ms cubic-bezier(.25,.1,.25,1),left 65ms cubic-bezier(.25,.1,.25,1);
z-index:1;will-change:transform,top,left;text-shadow:0 1px 2px rgba(0,0,0,.15);backface-visibility:hidden;}
.t-2{background:linear-gradient(150deg,#fff8ef,#ffe8d0);color:#8a7460;box-shadow:0 3px 10px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.6),inset 0 -1px 0 rgba(0,0,0,.04);}
.t-4{background:linear-gradient(150deg,#fff0d4,#ffddb5);color:#8a7050;box-shadow:0 3px 10px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.5),inset 0 -1px 0 rgba(0,0,0,.05);}
.t-8{background:linear-gradient(150deg,#ffca8a,#ffb066);color:#fff;box-shadow:0 4px 14px rgba(255,176,102,.25),inset 0 1px 0 rgba(255,255,255,.3),inset 0 -1px 0 rgba(0,0,0,.08);}
.t-16{background:linear-gradient(150deg,#ffac80,#ff8a6a);color:#fff;box-shadow:0 4px 16px rgba(255,138,106,.3),inset 0 1px 0 rgba(255,255,255,.25),inset 0 -1px 0 rgba(0,0,0,.08);}
.t-32{background:linear-gradient(150deg,#ff8a7a,#f06878);color:#fff;box-shadow:0 5px 18px rgba(240,104,120,.3),inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.1);}
.t-64{background:linear-gradient(150deg,#f06888,#e04878);color:#fff;box-shadow:0 5px 20px rgba(224,72,120,.35),inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.1);}
.t-128{background:linear-gradient(150deg,#cf5ca0,#b848c0);color:#fff;box-shadow:0 0 28px rgba(184,72,192,.35),0 5px 18px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.2);}
.t-256{background:linear-gradient(150deg,#a858d0,#8a4cf0);color:#fff;box-shadow:0 0 32px rgba(138,76,240,.4),0 5px 18px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.2);}
.t-512{background:linear-gradient(150deg,#7c6cf0,#5c58f0);color:#fff;box-shadow:0 0 36px rgba(92,88,240,.4),0 5px 18px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.2);}
.t-1024{background:linear-gradient(150deg,#5cb8e0,#48d0c8);color:#fff;box-shadow:0 0 40px rgba(72,208,200,.4),0 5px 18px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.25);}
.t-2048{background:linear-gradient(150deg,#ffd060,#ffb830,#ffa020);color:var(--text-dark);box-shadow:0 0 55px rgba(255,184,48,.5),0 5px 18px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.3);animation:crown 2s ease-in-out infinite;}
.t-over{background:linear-gradient(150deg,#ff9040,#ff6830);color:#fff;box-shadow:0 0 55px rgba(255,104,48,.5),0 5px 18px rgba(0,0,0,.15);animation:crown 2s ease-in-out infinite;}
@keyframes crown{0%,100%{transform:scale(1) rotate(0);}30%{transform:scale(1.05) rotate(.7deg);}50%{transform:scale(1.07) rotate(-.5deg);}70%{transform:scale(1.04) rotate(.3deg);}}
/* ═══ SQUISHY ANIMATIONS ═══ */
.t.spawn{animation:bIn .18s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes bIn{
0%  {transform:scale(0) rotate(-8deg);opacity:0;}
25% {transform:scale(1.25) scaleX(1.15) scaleY(.88) rotate(2deg);opacity:1;}
45% {transform:scale(.85) scaleX(.9) scaleY(1.1) rotate(-1.5deg);}
65% {transform:scale(1.08) scaleX(1.03) scaleY(.97) rotate(.5deg);}
80% {transform:scale(.97);}
100%{transform:scale(1) rotate(0);opacity:1;}
}
.t.merge{animation:jP .2s cubic-bezier(.34,1.56,.64,1);z-index:2;}
@keyframes jP{
0%  {transform:scale(1);}
18% {transform:scale(1.45) scaleX(1.18) scaleY(.84) rotate(1.5deg);}
34% {transform:scale(.78) scaleX(.88) scaleY(1.14) rotate(-1deg);}
52% {transform:scale(1.18) scaleX(1.06) scaleY(.94);}
68% {transform:scale(.92) scaleX(.96) scaleY(1.04);}
82% {transform:scale(1.06);}
94% {transform:scale(.98);}
100%{transform:scale(1) rotate(0);}
}
.t.sq-r{animation:sqR .09s cubic-bezier(.22,1.3,.36,1);}
.t.sq-l{animation:sqL .09s cubic-bezier(.22,1.3,.36,1);}
.t.sq-d{animation:sqD .09s cubic-bezier(.22,1.3,.36,1);}
.t.sq-u{animation:sqU .09s cubic-bezier(.22,1.3,.36,1);}
@keyframes sqR{0%{transform:scaleX(1) scaleY(1);}40%{transform:scaleX(.82) scaleY(1.18) translateX(-3px);}65%{transform:scaleX(1.1) scaleY(.9) translateX(1.5px);}85%{transform:scaleX(.96) scaleY(1.04);}100%{transform:scaleX(1) scaleY(1) translateX(0);}}
@keyframes sqL{0%{transform:scaleX(1) scaleY(1);}40%{transform:scaleX(.82) scaleY(1.18) translateX(3px);}65%{transform:scaleX(1.1) scaleY(.9) translateX(-1.5px);}85%{transform:scaleX(.96) scaleY(1.04);}100%{transform:scaleX(1) scaleY(1) translateX(0);}}
@keyframes sqD{0%{transform:scaleY(1) scaleX(1);}40%{transform:scaleY(.82) scaleX(1.18) translateY(-3px);}65%{transform:scaleY(1.1) scaleX(.9) translateY(1.5px);}85%{transform:scaleY(.96) scaleX(1.04);}100%{transform:scaleY(1) scaleX(1) translateY(0);}}
@keyframes sqU{0%{transform:scaleY(1) scaleX(1);}40%{transform:scaleY(.82) scaleX(1.18) translateY(3px);}65%{transform:scaleY(1.1) scaleX(.9) translateY(-1.5px);}85%{transform:scaleY(.96) scaleX(1.04);}100%{transform:scaleY(1) scaleX(1) translateY(0);}}
/* ── FX ── */
.fx{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:18px;z-index:50;}
.dot{position:absolute;border-radius:50%;pointer-events:none;animation:dF var(--d,.4s) cubic-bezier(.15,.8,.3,1) forwards;}
@keyframes dF{0%{transform:scale(1.1) translate(0,0);opacity:.9;}45%{opacity:.6;}100%{transform:scale(0) translate(var(--dx),var(--dy));opacity:0;}}
.dot.star{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
.ring{position:absolute;border-radius:50%;pointer-events:none;border:2.5px solid;opacity:0;animation:rG .25s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes rG{0%{transform:scale(0);opacity:.65;border-width:3px;}55%{opacity:.2;}100%{transform:scale(2.4);opacity:0;border-width:.5px;}}
.plus{position:absolute;font-weight:900;pointer-events:none;z-index:60;animation:pU .5s cubic-bezier(.22,1.3,.36,1) forwards;}
@keyframes pU{0%{transform:translateY(0) scale(0);opacity:0;}18%{transform:translateY(-8px) scale(1.3);opacity:1;}40%{transform:translateY(-18px) scale(1.05);opacity:.9;}65%{transform:translateY(-35px) scale(.95);opacity:.6;}100%{transform:translateY(-55px) scale(.6);opacity:0;}}
.streak{position:absolute;font-weight:900;font-size:15px;pointer-events:none;z-index:61;color:var(--sky);animation:sW .45s cubic-bezier(.22,1.6,.36,1) forwards;}
@keyframes sW{0%{transform:scale(0) rotate(-15deg);opacity:0;}20%{transform:scale(1.4) rotate(4deg);opacity:1;}40%{transform:scale(1) rotate(-2deg);}55%{transform:scale(1.15) rotate(1deg);opacity:.8;}75%{transform:scale(1.05);opacity:.45;}100%{transform:translateY(-30px) scale(.5);opacity:0;}}
/* ── UI ── */
.controls{display:flex;gap:10px;margin-top:12px;width:min(430px,92vw);justify-content:center;padding-bottom:env(safe-area-inset-bottom,8px);}
.btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;letter-spacing:.3px;padding:10px 24px;
border:1px solid rgba(255,199,92,.15);border-radius:12px;background:var(--board);color:var(--text);cursor:pointer;
transition:all .15s cubic-bezier(.22,1.4,.36,1);}
.btn:hover{transform:translateY(-2px) scale(1.04);border-color:var(--gold);box-shadow:0 8px 20px rgba(255,199,92,.1);}
.btn:active{transform:translateY(1px) scale(.95);transition-duration:.05s;}
.btn-go{background:linear-gradient(135deg,var(--warm1),var(--warm2));border:none;color:#fff;}
.ov{position:absolute;inset:0;background:rgba(30,27,46,.92);backdrop-filter:blur(12px);border-radius:18px;
display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s;}
.ov.on{opacity:1;pointer-events:all;}
.ov.on h2{animation:ovI .25s cubic-bezier(.22,1.6,.36,1) both;}
.ov.on p{animation:ovI .25s cubic-bezier(.22,1.6,.36,1) .04s both;}
.ov.on .btn{animation:ovI .25s cubic-bezier(.22,1.6,.36,1) .08s both;}
@keyframes ovI{0%{transform:scale(0) translateY(25px);opacity:0;}50%{transform:scale(1.08) translateY(-3px);}70%{transform:scale(.96);}85%{transform:scale(1.02);}100%{transform:scale(1) translateY(0);opacity:1;}}
.ov h2{font-size:32px;font-weight:900;margin-bottom:5px;background:linear-gradient(135deg,var(--gold),var(--warm2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ov p{font-size:14px;opacity:.65;margin-bottom:16px;}
.snd{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:var(--cell);
border:1px solid rgba(255,199,92,.1);color:var(--text);font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;transition:all .15s cubic-bezier(.22,1.4,.36,1);z-index:10;}
.snd:hover{border-color:var(--gold);transform:scale(1.1) rotate(10deg);}
.snd:active{transform:scale(.88) rotate(-5deg);}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="header">
<div class="logo">2048</div>
<div class="scores">
<div class="score-box" id="sBox"><div class="score-label">Score</div><div class="score-val" id="sVal">0</div></div>
<div class="score-box" id="bBox"><div class="score-label">Best</div><div class="score-val" id="bVal">0</div></div>
</div>
</div>
<div class="board-wrap">
<div class="board" id="board">
<div class="grid-bg" id="gridBg"></div>
<div class="tiles" id="tiles"></div>
<div class="fx" id="fx"></div>
<div class="glow-layer" id="glow"></div>
<div class="ov" id="ov">
<h2 id="ovT">Game Over</h2>
<p id="ovM">No more moves!</p>
<button class="btn btn-go" id="ovBtn">Try Again</button>
</div>
<button class="snd" id="sndBtn" onclick="togSnd()">🔊</button>
</div>
</div>
<div class="controls">
<button class="btn" onclick="undo()">↩ Undo</button>
<button class="btn btn-go" onclick="init()">New Game</button>
</div>
<script>
const AC=window.AudioContext||window.webkitAudioContext;
let ax=null,sndOn=true;
function ea(){if(!ax)try{ax=new AC();if(ax.state==='suspended')ax.resume();}catch(e){}}
function tn(f,d,w='sine',v=.1,dl=0){if(!sndOn||!ax)return;try{const t=ax.currentTime+dl,o=ax.createOscillator(),g=ax.createGain();o.type=w;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(ax.destination);o.start(t);o.stop(t+d);}catch(e){}}
function sndMove(){tn(350,.045,'sine',.04);tn(525,.03,'sine',.025,.01);}
function sndMerge(val){const s=Math.log2(val)-1,b=280+s*30;tn(b,.18,'sine',.09);tn(b*1.5,.14,'triangle',.055,.015);tn(b*2,.11,'sine',.035,.03);tn(70,.06,'square',.05);if(val>=64){tn(b*3,.09,'sine',.025,.045);tn(b*4,.07,'sine',.015,.06);}}
function sndBig(val){sndMerge(val);setTimeout(()=>{tn(540,.22,'sine',.08);tn(680,.18,'triangle',.05,.03);tn(810,.14,'sine',.035,.06);},35);}
function sndNew(){tn(1100,.04,'sine',.025);tn(1500,.03,'sine',.015,.012);}
function sndOver(){tn(210,.28,'sawtooth',.07);tn(165,.34,'sawtooth',.05,.12);tn(125,.4,'sawtooth',.035,.28);}
function sndWin(){[540,680,810,910,1080].forEach((f,i)=>{tn(f,.3,'sine',.09,i*.08);tn(f*1.5,.2,'triangle',.04,i*.08+.02);});}
function sndStreak(n){const f=620+n*110;tn(f,.14,'sine',.08);tn(f*1.5,.1,'triangle',.05,.025);tn(f*2,.07,'sine',.025,.05);}
function togSnd(){sndOn=!sndOn;document.getElementById('sndBtn').textContent=sndOn?'🔊':'🔇';}
const N=4;let G=[],sc=0,bs=+localStorage.getItem('2048b')||0;
let pG=null,pS=0,mv=false,wn=false,wa=false,tid=0,msk=0,moveTimer=null;
const eG=()=>Array.from({length:N},()=>Array(N).fill(null));
const cG=g=>g.map(r=>r.map(c=>c?{...c}:null));
function ec(g){const r=[];for(let i=0;i<N;i++)for(let j=0;j<N;j++)if(!g[i][j])r.push([i,j]);return r;}
function addT(g){const e=ec(g);if(!e.length)return null;const[r,c]=e[Math.floor(Math.random()*e.length)];const v=Math.random()<.9?2:4,id=++tid;g[r][c]={value:v,id};return{r,c,value:v,id};}
function canMv(g){for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(!g[r][c])return true;const v=g[r][c].value;if(c<N-1&&g[r][c+1]&&g[r][c+1].value===v)return true;if(r<N-1&&g[r+1][c]&&g[r+1][c].value===v)return true;}return false;}
function slide(row){const f=row.filter(c=>c!==null),res=[],mg=[];let s=0,i=0;while(i<f.length){if(i+1<f.length&&f[i].value===f[i+1].value){const nv=f[i].value*2,ni=++tid;res.push({value:nv,id:ni});mg.push({from:[f[i].id,f[i+1].id],to:ni,val:nv});s+=nv;i+=2;}else{res.push({...f[i]});i++;}}while(res.length<N)res.push(null);let moved=false;for(let j=0;j<N;j++){const a=row[j],b=res[j];if((!a&&b)||(a&&!b)||(a&&b&&a.id!==b.id)){moved=true;break;}}return{res,s,moved,mg};}
function calc(dir){const ng=cG(G);let ts=0,any=false;const am=[],li=new Set();for(let i=0;i<N;i++){let ln;if(dir===0)ln=[ng[0][i],ng[1][i],ng[2][i],ng[3][i]];else if(dir===1)ln=[...ng[i]].reverse();else if(dir===2)ln=[ng[3][i],ng[2][i],ng[1][i],ng[0][i]];else ln=[...ng[i]];const ol=ln.slice();const{res,s,moved,mg}=slide(ln);ts+=s;if(moved)any=true;am.push(...mg);if(moved)for(let j=0;j<N;j++)if(res[j]&&(!ol[j]||ol[j].id!==res[j].id))li.add(res[j].id);let fl=res;if(dir===1||dir===2)fl=[...res].reverse();if(dir===0||dir===2)for(let r=0;r<N;r++)ng[r][i]=fl[r];else ng[i]=fl;}return{ng,ts,any,am,li};}
const $b=document.getElementById('board'),$t=document.getElementById('tiles'),$s=document.getElementById('sVal'),$bs=document.getElementById('bVal'),$fx=document.getElementById('fx'),$ov=document.getElementById('ov'),$ovBtn=document.getElementById('ovBtn'),$glow=document.getElementById('glow');
let bsz,csz,gp;
function sizes(){bsz=$b.clientWidth-20;gp=10;csz=(bsz-gp*(N-1))/N;}
function cp(i){return i*(csz+gp);}
function tc(v){return v<=2048?'t-'+v:'t-over';}
function fs(v){if(v<100)return Math.min(csz*.46,38)+'px';if(v<1000)return Math.min(csz*.38,32)+'px';if(v<10000)return Math.min(csz*.3,26)+'px';return Math.min(csz*.24,21)+'px';}
function rGrid(){const bg=document.getElementById('gridBg');bg.innerHTML='';for(let i=0;i<N*N;i++){const d=document.createElement('div');d.className='cell-slot';d.id='cs'+i;bg.appendChild(d);}}
let els={};
const sqC=['sq-u','sq-r','sq-d','sq-l'];
function rT(nt,mi,li,dir){
sizes();
const act=new Set();
for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(G[r][c])act.add(G[r][c].id);
for(const id of Object.keys(els))if(!act.has(+id)){const e=els[id];if(e&&e.parentNode)e.remove();delete els[id];}
for(let r=0;r<N;r++)for(let c=0;c<N;c++){
const cell=G[r][c];if(!cell)continue;
let e=els[cell.id];
if(!e){e=document.createElement('div');e.className='t';$t.appendChild(e);els[cell.id]=e;}
e.textContent=cell.value;e.className='t '+tc(cell.value);
e.style.width=csz+'px';e.style.height=csz+'px';e.style.fontSize=fs(cell.value);
e.style.left=cp(c)+'px';e.style.top=cp(r)+'px';
if(nt&&cell.id===nt.id){e.classList.add('spawn');e.onanimationend=()=>e.classList.remove('spawn');}
if(mi&&mi.has(cell.id)){e.classList.add('merge');e.onanimationend=()=>e.classList.remove('merge');}
if(li&&li.has(cell.id)&&!(mi&&mi.has(cell.id))&&dir!==undefined){const cls=sqC[dir];e.classList.add(cls);e.onanimationend=()=>e.classList.remove(cls);}
}
}
function uSc(gained){$s.textContent=sc;if(sc>bs){bs=sc;localStorage.setItem('2048b',bs);}$bs.textContent=bs;if(gained>0){$s.classList.remove('pop');void $s.offsetWidth;$s.classList.add('pop');}}
function burst(r,c,val){
sizes();const cx=cp(c)+csz/2,cy=cp(r)+csz/2;
const cols=['#ffb088','#ff8a7a','#cf5ca0','#ffc75c','#7c6cf0','#5dd6a8','#6bc5e8','#e8697a'];
const tier=Math.log2(val),cnt=Math.min(8+tier*2,22);
for(let i=0;i<cnt;i++){const p=document.createElement('div');const sp=Math.random()<.3;p.className='dot'+(sp?' star':'');const sz=3+Math.random()*(sp?11:7);const ang=(Math.PI*2*i)/cnt+(Math.random()-.5)*.6;const dist=35+Math.random()*(38+tier*8);const dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist;const dur=.35+Math.random()*.45;const cl=cols[Math.floor(Math.random()*cols.length)];p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px;background:${cl};--dx:${dx}px;--dy:${dy}px;--d:${dur}s;`;$fx.appendChild(p);p.onanimationend=()=>p.remove();}
if(val>=32){const rn=document.createElement('div');rn.className='ring';const rs=csz*.38;const rc=val>=256?'#6bc5e8':val>=64?'#cf5ca0':'#ffb088';rn.style.cssText=`width:${rs}px;height:${rs}px;left:${cx-rs/2}px;top:${cy-rs/2}px;border-color:${rc};`;$fx.appendChild(rn);rn.onanimationend=()=>rn.remove();}
if(val>=128){setTimeout(()=>{const r2=document.createElement('div');r2.className='ring';const s2=csz*.3;r2.style.cssText=`width:${s2}px;height:${s2}px;left:${cx-s2/2}px;top:${cy-s2/2}px;border-color:#ffc75c;`;$fx.appendChild(r2);r2.onanimationend=()=>r2.remove();},40);}
if(val>=512){setTimeout(()=>{const r3=document.createElement('div');r3.className='ring';const s3=csz*.48;r3.style.cssText=`width:${s3}px;height:${s3}px;left:${cx-s3/2}px;top:${cy-s3/2}px;border-color:#5dd6a8;`;$fx.appendChild(r3);r3.onanimationend=()=>r3.remove();},80);}
}
function showPlus(r,c,pts){sizes();const cx=cp(c)+csz/2,cy=cp(r);const e=document.createElement('div');e.className='plus';e.textContent='+'+pts;e.style.cssText=`left:${cx}px;top:${cy}px;transform:translateX(-50%);font-size:${Math.min(20+Math.log2(pts)*2.5,38)}px;background:linear-gradient(135deg,var(--gold),var(--warm2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;$fx.appendChild(e);e.onanimationend=()=>e.remove();}
function showStrk(r,c,n){sizes();const cx=cp(c)+csz/2,cy=cp(r)-18;const e=document.createElement('div');e.className='streak';const lb=['','','Double!','Triple!','Quad!','MEGA!','ULTRA!','INSANE!!'];e.textContent=lb[Math.min(n,7)]||('×'+n+'!!');e.style.cssText=`left:${cx}px;top:${cy}px;transform:translateX(-50%);`;$fx.appendChild(e);e.onanimationend=()=>e.remove();}
function shake(big){$b.classList.remove('shake','bigshake');void $b.offsetWidth;$b.classList.add(big?'bigshake':'shake');$b.onanimationend=()=>$b.classList.remove('shake','bigshake');}
function glow(clr){$glow.style.background=`radial-gradient(circle,${clr} 0%,transparent 70%)`;$glow.classList.remove('on');void $glow.offsetWidth;$glow.classList.add('on');$glow.onanimationend=()=>$glow.classList.remove('on');}
function dimple(dir){const cells=document.querySelectorAll('.cell-slot');let idx=[];if(dir===0)idx=[0,1,2,3];else if(dir===2)idx=[12,13,14,15];else if(dir===3)idx=[0,4,8,12];else idx=[3,7,11,15];idx.forEach((i,n)=>{const c=cells[i];if(!c)return;setTimeout(()=>{c.classList.add('dimple');c.onanimationend=()=>c.classList.remove('dimple');},n*8);});}
function init(){G=eG();sc=0;pG=null;pS=0;mv=false;wn=false;wa=false;tid=0;msk=0;$t.innerHTML='';els={};$fx.innerHTML='';$ov.classList.remove('on');addT(G);const t2=addT(G);uSc(0);rT(t2,null,null);$b.classList.remove('locked');ea();}
function undo(){if(!pG)return;if(moveTimer)clearTimeout(moveTimer);mv=false;$t.innerHTML='';els={};G=cG(pG);sc=pS;pG=null;uSc(0);rT(null,null,null);$ov.classList.remove('on');$b.classList.remove('locked');}
function go(dir){
if(mv)return;ea();
const{ng,ts,any,am,li}=calc(dir);
if(!any)return;
mv=true;$b.classList.add('locked');pG=cG(G);pS=sc;
const mi=new Set();for(const m of am)mi.add(m.to);
G=ng;sc+=ts;
sndMove();dimple(dir);rT(null,null,null);
moveTimer=setTimeout(()=>{
if(am.length>0){
msk++;const mx=Math.max(...am.map(m=>m.val));
for(const m of am){(m.val>=128?sndBig:sndMerge)(m.val);for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(G[r][c]&&G[r][c].id===m.to){burst(r,c,m.val);showPlus(r,c,m.val);}}
if(msk>=2){sndStreak(msk);const m=am[0];for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(G[r][c]&&G[r][c].id===m.to)showStrk(r,c,msk);}
shake(am.length>2||mx>=128);
if(mx>=256)glow('rgba(107,197,232,.3)');else if(mx>=64)glow('rgba(207,92,158,.25)');else if(mx>=16)glow('rgba(255,176,136,.2)');
rT(null,mi,li,dir);
}else{msk=0;rT(null,null,li,dir);}
uSc(ts);
if(!wn){for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(G[r][c]&&G[r][c].value===2048){wn=true;if(!wa){wa=true;sndWin();for(let i=0;i<4;i++)for(let j=0;j<4;j++)setTimeout(()=>burst(i,j,2048),i*15+j*15);showOv('You Win! 🎉','Keep going?','Continue');}}}
const nt=addT(G);if(nt){sndNew();rT(nt,mi,null);}
if(!canMv(G))setTimeout(()=>{sndOver();shake(true);showOv('Game Over','Final score: '+sc,'Try Again');},120);
mv=false;$b.classList.remove('locked');moveTimer=null;
},70);
}
function showOv(t,m,b){document.getElementById('ovT').textContent=t;document.getElementById('ovM').textContent=m;$ovBtn.textContent=b;$ov.classList.remove('on');void $ov.offsetWidth;$ov.classList.add('on');}
document.addEventListener('keydown',e=>{const m={ArrowUp:0,ArrowRight:1,ArrowDown:2,ArrowLeft:3,w:0,d:1,s:2,a:3};if(m[e.key]!==undefined){e.preventDefault();if($ov.classList.contains('on')){$ov.classList.remove('on');if(!canMv(G)){init();return;}}go(m[e.key]);}});

// ═══ BULLETPROOF MOBILE SWIPE ═══
let tx=null,ty=null,tt=0,swipeActive=false,moveTimeout=null;
const SWIPE_THRESH=35;
function resetInput(){tx=ty=null;swipeActive=false;}

$b.addEventListener('touchstart',e=>{
if(e.touches.length===1){e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();swipeActive=true;}
},{passive:false});

$b.addEventListener('touchmove',e=>{
if(swipeActive)e.preventDefault(); // Blocks iOS scroll/zoom
},{passive:false});

$b.addEventListener('touchend',e=>{
if(!swipeActive||tx===null)return;resetInput();
const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;
if(Date.now()-tt>600||(Math.abs(dx)<SWIPE_THRESH&&Math.abs(dy)<SWIPE_THRESH))return;
if($ov.classList.contains('on')){$ov.classList.remove('on');if(!canMv(G)){init();return;}}
Math.abs(dx)>Math.abs(dy)?go(dx>0?1:3):go(dy>0?2:0);
});

$b.addEventListener('touchcancel',resetInput);

// Mouse fallback (prevents hybrid double-fire)
let md=false;
$b.addEventListener('mousedown',e=>{md=true;tx=e.clientX;ty=e.clientY;tt=Date.now();swipeActive=true;});
document.addEventListener('mouseup',e=>{
if(!md||!swipeActive)return;md=false;resetInput();
const dx=e.clientX-tx,dy=e.clientY-ty;
if(Date.now()-tt>600||(Math.abs(dx)<SWIPE_THRESH&&Math.abs(dy)<SWIPE_THRESH))return;
if($ov.classList.contains('on')){$ov.classList.remove('on');if(!canMv(G)){init();return;}}
Math.abs(dx)>Math.abs(dy)?go(dx>0?1:3):go(dy>0?2:0);
});

// Context menu & zoom prevention
document.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('resize',()=>{rGrid();$t.innerHTML='';els={};rT(null,null,null);});
rGrid();init();$bs.textContent=bs;
</script>
